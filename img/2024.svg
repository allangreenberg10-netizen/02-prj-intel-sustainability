<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">2024 Intel Timeline</title>
  <desc id="desc">A clean timeline card illustration for 2024.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede2ff"/>
      <stop offset="100%" stop-color="#b99ae6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="80" y="80" width="1040" height="515" rx="34" fill="rgba(7,21,33,0.12)"/>
  <rect x="870" y="145" width="160" height="160" rx="26" fill="#7b4ec4"/>
  <text x="950" y="224" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" fill="#ffffff">2024</text>
  <text x="600" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="700" fill="#4b2d7a">Summit</text>
  <text x="600" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#4b2d7a">Sustainability</text>
  <text x="145" y="175" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="#4b2d7a">Supplier and industry collaboration</text>
  <text x="145" y="245" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#614482">Intel hosts its first Sustainability Summit.</text>
</svg>