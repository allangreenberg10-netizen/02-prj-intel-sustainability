<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">1968 Intel Timeline</title>
  <desc id="desc">A clean timeline card illustration for 1968.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4e6bf"/>
      <stop offset="100%" stop-color="#b2d0c7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="70" y="80" width="1060" height="515" rx="34" fill="rgba(7,21,33,0.14)"/>
  <circle cx="240" cy="190" r="95" fill="#f7f0d9" opacity="0.75"/>
  <rect x="780" y="135" width="300" height="190" rx="24" fill="#0d4970"/>
  <text x="930" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="700" fill="#ffffff">intel</text>
  <text x="930" y="305" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#ffffff">1968</text>
  <text x="155" y="165" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700" fill="#2c3e50">Early Semiconductor Era</text>
  <text x="155" y="260" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#41556a">Founding year and the start of Intel's story.</text>
  <rect x="140" y="360" width="920" height="18" rx="9" fill="#4f6f7a" opacity="0.35"/>
  <rect x="140" y="415" width="760" height="18" rx="9" fill="#4f6f7a" opacity="0.35"/>
  <rect x="140" y="470" width="560" height="18" rx="9" fill="#4f6f7a" opacity="0.35"/>
</svg>